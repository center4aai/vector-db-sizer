name: elasticsearch_quantized

dataset:
  source_type: precomputed_vectors
  vector_count: 1000000

embedding:
  kind: dense
  dimensions: 1536
  dtype: float32

record:
  id_bytes_avg: 16
  metadata_bytes_avg: 1000
  source_text_bytes_avg: 0
  provenance_bytes_avg: 128

database:
  engine: elasticsearch
  index_type: hnsw
  replicas: 1
  shards: 1

index:
  m: 16
  hnsw_layer_factor: 1.2
  link_bytes: 8
  quantization: scalar_int8

storage:
  store_vectors_in_source: false
  store_original_vectors: true
  wal_factor: 0.10
  snapshot_factor: 0.00
  safety_factor: 1.25
