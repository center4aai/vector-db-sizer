name: qdrant_text_hnsw

dataset:
  source_type: text
  total_tokens: 50000000
  chunk_tokens: 512
  chunk_overlap: 64
  vectors_per_chunk: 1

embedding:
  kind: dense
  dimensions: 1536
  dtype: float32

record:
  id_bytes_avg: 16
  metadata_bytes_avg: 512
  source_text_bytes_avg: 0
  provenance_bytes_avg: 128

database:
  engine: qdrant
  index_type: hnsw
  replicas: 1
  shards: 1

index:
  m: 16
  hnsw_layer_factor: 1.2
  link_bytes: 8
  quantization: none

storage:
  payload_on_disk: true
  vectors_on_disk: false
  hnsw_on_disk: false
  wal_factor: 0.10
  snapshot_factor: 0.00
  safety_factor: 1.25
